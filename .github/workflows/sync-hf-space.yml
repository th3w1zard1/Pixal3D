name: Sync Hugging Face Space

on:
    workflow_dispatch:
        inputs:
            hf_space_repo_id:
                description: Optional override for the full Hugging Face Space repo id.
                required: false
                type: string
            hf_space_name:
                description: Optional override for the Hugging Face Space name.
                required: false
                type: string
            hf_space_namespace:
                description: Optional override for the Hugging Face namespace or org.
                required: false
                type: string
            hf_space_sdk:
                description: Optional override for the Hugging Face Space SDK.
                required: false
                type: string
            hf_space_private:
                description: Create or preserve the target Space as private for this run.
                required: false
                type: boolean
                default: false
            create_if_missing:
                description: Create the Hugging Face Space automatically if it does not exist.
                required: false
                type: boolean
                default: true
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    gate:
        # Sync on manual dispatch or every push to main unless HF_SPACE_AUTO_SYNC=false.
        if: >-
          github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.HF_SPACE_AUTO_SYNC != 'false')
        runs-on: ubuntu-latest
        outputs:
            sync_enabled: ${{ steps.token.outputs.sync_enabled }}
        steps:
            - name: Resolve Hugging Face sync gate
              id: token
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
              run: |
                  if [[ -n "$HF_TOKEN" ]]; then
                    echo "sync_enabled=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    echo "HF_TOKEN is required for sync-hf-space.yml." >&2
                    echo "Add the HF_TOKEN repository secret before dispatching this workflow." >&2
                    exit 1
                  fi
                  echo "HF_TOKEN not configured; skipping automatic Hugging Face Space sync." >&2
                  echo "sync_enabled=false" >> "$GITHUB_OUTPUT"

    preflight:
        needs: gate
        if: needs.gate.outputs.sync_enabled == 'true'
        runs-on: ubuntu-latest
        outputs:
            repo_id: ${{ steps.resolve.outputs.repo_id }}
            space_sdk: ${{ steps.resolve.outputs.space_sdk }}
            space_url: ${{ steps.resolve.outputs.space_url }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  lfs: true
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
            - name: Install Hugging Face Hub support
              run: python -m pip install huggingface_hub==0.30.2
            - name: Resolve Space configuration
              id: resolve
              env:
                  HF_SPACE_REPO_ID: ${{ github.event.inputs.hf_space_repo_id || vars.HF_SPACE_REPO_ID }}
                  HF_SPACE_NAME: ${{ github.event.inputs.hf_space_name || vars.HF_SPACE_NAME }}
                  HF_SPACE_NAMESPACE: ${{ github.event.inputs.hf_space_namespace || vars.HF_SPACE_NAMESPACE }}
                  HF_SPACE_SDK: ${{ github.event.inputs.hf_space_sdk || vars.HF_SPACE_SDK || 'gradio' }}
              run: python scripts/resolve_hf_space_config.py
            - name: Verify Hugging Face token and ensure Space exists
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
                  HF_SPACE_REPO_ID: ${{ github.event.inputs.hf_space_repo_id || vars.HF_SPACE_REPO_ID }}
                  HF_SPACE_NAME: ${{ github.event.inputs.hf_space_name || vars.HF_SPACE_NAME }}
                  HF_SPACE_NAMESPACE: ${{ github.event.inputs.hf_space_namespace || vars.HF_SPACE_NAMESPACE }}
                  HF_SPACE_SDK: ${{ steps.resolve.outputs.space_sdk }}
                  HF_SPACE_PRIVATE: ${{ github.event.inputs.hf_space_private || vars.HF_SPACE_PRIVATE || 'false' }}
                  HF_SPACE_CREATE_IF_MISSING: ${{ github.event.inputs.create_if_missing || 'true' }}
              run: python scripts/ensure_hf_space.py

    sync:
        needs: [gate, preflight]
        if: needs.gate.outputs.sync_enabled == 'true' && needs.preflight.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  lfs: true
            - name: Mirror repository to Hugging Face Space
              uses: huggingface/hub-sync@v0.1.0
              with:
                  github_repo_id: ${{ github.repository }}
                  huggingface_repo_id: ${{ needs.preflight.outputs.repo_id }}
                  hf_token: ${{ secrets.HF_TOKEN }}
                  space_sdk: ${{ needs.preflight.outputs.space_sdk }}
                  private: ${{ github.event.inputs.hf_space_private || vars.HF_SPACE_PRIVATE || 'false' }}

    verify:
        needs: [gate, preflight, sync]
        if: needs.gate.outputs.sync_enabled == 'true' && needs.sync.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
            - name: Poll live Space smoke after sync
              env:
                  SPACE_URL: ${{ needs.preflight.outputs.space_url }}
              run: |
                  set -euo pipefail
                  for attempt in 1 2 3 4 5 6 7 8; do
                    echo "Smoke attempt ${attempt} for ${SPACE_URL}"
                    if python scripts/space_smoke.py --health-only --html-check --url "${SPACE_URL}"; then
                      exit 0
                    fi
                    sleep 15
                  done
                  echo "Space smoke failed after sync polling window." >&2
                  exit 1
